name: Main PR Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test-integration-and-docker-build:
    name: Test, Integration Test And Docker Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: community_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SPRING_PROFILES_ACTIVE: test

      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: community_test
      DB_USERNAME: testuser
      DB_PASSWORD: testpass

      JWT_SECRET: test-secret-key-test-secret-key-test-secret-key-test-secret-key
      JWT_ACCESS_TOKEN_EXPIRATION: 1800000
      JWT_REFRESH_TOKEN_EXPIRATION: 1209600000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build application
        run: ./gradlew clean build --no-daemon

      - name: Prepare app.jar for Docker build
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No executable jar file found in build/libs"
            exit 1
          fi

          cp "$JAR_FILE" build/libs/app.jar
          ls -lh build/libs/app.jar

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t community-backend:main-pr-check .