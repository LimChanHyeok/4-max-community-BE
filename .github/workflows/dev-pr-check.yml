name: Dev PR Check

on:
  pull_request:
    branches:
      - dev
    types:
      # PR을 처음 만들 때, PR에 새 commit push 했을 때, 닫았던 PR을 다시 열었을 때 재검증
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: dev-pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true # 검사 실행 중 같은 PR에 새 commit이 오면 이전 실행 취소

jobs:
  check:
    name: Test, Integration Test And Conditional Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: community_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: community_test
      DB_USER: testuser
      DB_PASSWORD: testpass
      JWT_SECRET: test-jwt-secret-test-jwt-secret-test-jwt-secret-test-jwt-secret
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 1209600000

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git diff로 base 브랜치와 PR 브랜치를 비교하기 위해 전체 히스토리 가져오기

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Check changed files
        id: changes
        shell: bash
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -E '(^Dockerfile$|^\.dockerignore$|^docker-compose.*\.ya?ml$|^compose\.ya?ml$|^deploy\.sh$|^scripts/.*\.sh$)' > /dev/null; then
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bootJar
        if: steps.changes.outputs.docker_changed == 'true'
        shell: bash
        run: |
          ./gradlew bootJar --no-daemon
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          cp "$JAR_FILE" build/libs/app.jar # dockerfile에선 app.jar를 찾기 때문에  app.jar로 복사

      - name: Build Docker image
        if: steps.changes.outputs.docker_changed == 'true'
        run: docker build --platform linux/amd64 -t community-backend:dev-pr-check .