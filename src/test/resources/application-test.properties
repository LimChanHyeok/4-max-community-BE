spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.upload.base-dir=build/test-uploads
app.upload.base-url=/uploads

jwt.secret=${JWT_SECRET}

app.view-count.flush-delay-ms=5000
app.image.cleanup.fixed-delay-ms=3600000
app.image.orphan-retention-hours=24